<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepRead Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        h1 { font-size: 2rem; margin-bottom: 8px; color: #fff; }
        .subtitle { color: #888; margin-bottom: 40px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 32px; width: 100%; max-width: 640px; margin-bottom: 24px; }
        .mode-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .mode-tab { padding: 8px 16px; border-radius: 8px; border: 1px solid #333; background: transparent; color: #888; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .mode-tab.active { background: #2563eb; color: #fff; border-color: #2563eb; }
        .mode-tab:hover { border-color: #555; }
        .drop-zone { border: 2px dashed #333; border-radius: 8px; padding: 48px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
        .drop-zone:hover, .drop-zone.dragover { border-color: #2563eb; background: #111; }
        .drop-zone p { color: #666; margin-top: 8px; font-size: 14px; }
        .file-name { color: #2563eb; font-size: 14px; margin-top: 8px; }
        input[type="file"] { display: none; }
        button.submit { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        button.submit:hover { background: #1d4ed8; }
        button.submit:disabled { background: #333; cursor: not-allowed; }
        .result { background: #111; border: 1px solid #333; border-radius: 8px; padding: 16px; overflow-x: auto; margin-top: 16px; }
        .result pre { color: #4ade80; font-size: 13px; white-space: pre-wrap; word-break: break-all; }
        .status { text-align: center; color: #888; padding: 24px; font-size: 14px; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #333; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #f87171; }
        .footer { margin-top: 40px; color: #555; font-size: 13px; }
        .footer a { color: #2563eb; text-decoration: none; }
        .schema-input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-family: monospace; font-size: 13px; resize: vertical; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>
    <h1>DeepRead Demo</h1>
    <p class="subtitle">Upload a document. Get structured data back.</p>

    <div class="card">
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="ocr">OCR Extract</button>
            <button class="mode-tab" data-mode="structured">Structured JSON</button>
            <button class="mode-tab" data-mode="pii">PII Redact</button>
        </div>

        <textarea class="schema-input" id="schema" rows="6" placeholder='{"type":"object","properties":{"vendor":{"type":"string"},...}}'></textarea>

        <div class="drop-zone" id="dropZone">
            <p>Drop a PDF, PNG, or JPEG here</p>
            <p>or click to browse</p>
            <div class="file-name" id="fileName"></div>
        </div>
        <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg">

        <button class="submit" id="submitBtn" disabled>Process Document</button>

        <div id="output"></div>
    </div>

    <p class="footer">Powered by <a href="https://www.deepread.tech" target="_blank">DeepRead</a> — 97%+ accuracy, multi-model consensus. <a href="https://www.deepread.tech/dashboard" target="_blank">Get free API key</a></p>

    <script>
        let selectedFile = null;
        let currentMode = 'ocr';

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');
        const output = document.getElementById('output');
        const schemaInput = document.getElementById('schema');

        // Mode tabs
        document.querySelectorAll('.mode-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentMode = tab.dataset.mode;
                schemaInput.style.display = currentMode === 'structured' ? 'block' : 'none';
            });
        });

        // File selection
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files.length) selectFile(fileInput.files[0]); });

        function selectFile(file) {
            selectedFile = file;
            fileName.textContent = file.name;
            submitBtn.disabled = false;
        }

        // Submit
        submitBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            output.innerHTML = '<div class="status"><span class="spinner"></span>Uploading and processing... this may take 1-3 minutes.</div>';

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('mode', currentMode);
            if (currentMode === 'structured' && schemaInput.value.trim()) {
                formData.append('schema', schemaInput.value.trim());
            }

            try {
                const resp = await fetch('/extract', { method: 'POST', body: formData });
                const data = await resp.json();

                if (resp.ok) {
                    output.innerHTML = '<div class="result"><pre>' + JSON.stringify(data, null, 2) + '</pre></div>';
                } else {
                    output.innerHTML = '<div class="result"><pre class="error">' + JSON.stringify(data, null, 2) + '</pre></div>';
                }
            } catch (err) {
                output.innerHTML = '<div class="result"><pre class="error">Error: ' + err.message + '</pre></div>';
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Process Document';
        });
    </script>
</body>
</html>
